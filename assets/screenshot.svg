<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400" font-family="SFMono-Regular,Consolas,Menlo,monospace">
  <rect width="800" height="400" rx="10" fill="#11111b"/>
  <rect width="800" height="34" rx="10" fill="#313244"/><rect y="20" width="800" height="14" fill="#313244"/>
  <circle cx="20" cy="17" r="6" fill="#f38ba8"/><circle cx="40" cy="17" r="6" fill="#f9e2af"/><circle cx="60" cy="17" r="6" fill="#a6e3a1"/>
  <text x="400" y="22" fill="#bac2de" font-size="12" text-anchor="middle">burnrate — SLO error budget</text>
  <text font-size="13" xml:space="preserve">
    <tspan x="18" y="64" fill="#6c7086"># target 99.9% → budget 0.1% · 30-day window</tspan>
    <tspan x="18" y="88" fill="#a6e3a1">$ </tspan><tspan fill="#cdd6f4">burn_rate(error_rate=0.015, target=0.999)</tspan>
    <tspan x="18" y="108" fill="#f9e2af">15.0x  </tspan><tspan fill="#6c7086"># burning budget 15× faster than sustainable</tspan>
    <tspan x="18" y="132" fill="#a6e3a1">$ </tspan><tspan fill="#cdd6f4">time_to_exhaustion(0.015, 0.999)</tspan>
    <tspan x="18" y="152" fill="#f38ba8">48.0 h  </tspan><tspan fill="#6c7086"># whole month's budget gone in 2 days</tspan>
    <tspan x="18" y="184" fill="#a6e3a1">$ </tspan><tspan fill="#cdd6f4">evaluate_policy(0.999, {1h: hot, 5m: hot})</tspan>
  </text>
  <rect x="18" y="198" width="764" height="120" rx="8" fill="#181825"/>
  <text font-size="12.5" xml:space="preserve">
    <tspan x="34" y="224" fill="#7d8590">window pair    burn≥    tier      consumes</tspan>
    <tspan x="34" y="246" fill="#f38ba8">1h &amp; 5m       14.4x    PAGE      2% in 1h   ← FIRES</tspan>
    <tspan x="34" y="266" fill="#f9e2af">6h &amp; 30m      6.0x     PAGE      5% in 6h</tspan>
    <tspan x="34" y="286" fill="#89b4fa">24h &amp; 2h      3.0x     TICKET    10% in 1d</tspan>
    <tspan x="34" y="306" fill="#89b4fa">3d &amp; 6h       1.0x     TICKET    10% in 3d</tspan>
  </text>
  <text font-size="12.5" xml:space="preserve">
    <tspan x="18" y="344" fill="#a6e3a1">→ Decision(fired=True, tier=PAGE, reason="1h &amp; 5m burn ≥ 14.4x")</tspan>
    <tspan x="18" y="372" fill="#6c7086"># both windows must burn → no paging on already-recovered blips · ✓ 11 tests</tspan>
  </text>
</svg>
